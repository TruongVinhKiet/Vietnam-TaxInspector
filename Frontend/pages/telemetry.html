<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetry Dashboard - TaxInspector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .gradient-text { background: linear-gradient(to right, #0284c7, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
    <!-- Header -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-10">
        <div class="flex items-center gap-4">
            <a href="agent.html" class="w-10 h-10 rounded-full hover:bg-slate-100 flex items-center justify-center text-slate-600 transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
                <h1 class="text-lg font-bold text-slate-800">Agent Telemetry <span class="gradient-text">Command Center</span></h1>
                <p class="text-xs text-slate-500 font-medium"><i class="fa-solid fa-circle text-[8px] text-emerald-500 animate-pulse"></i> Real-time Monitoring</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <select id="timeWindow" class="bg-slate-50 border border-slate-200 text-sm rounded-lg px-3 py-1.5 outline-none focus:border-sky-400">
                <option value="15">15 Phút</option>
                <option value="60" selected>1 Giờ</option>
                <option value="360">6 Giờ</option>
                <option value="1440">24 Giờ</option>
            </select>
            <button id="refreshBtn" class="bg-sky-50 text-sky-600 px-3 py-1.5 rounded-lg text-sm font-semibold hover:bg-sky-100 transition-colors">
                <i class="fa-solid fa-arrows-rotate"></i> Refresh
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 space-y-6">
        <!-- Key Metrics -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="glass-panel rounded-2xl p-5 shadow-sm">
                <div class="text-slate-500 text-sm font-medium mb-1 flex items-center gap-2"><i class="fa-solid fa-comments text-sky-500"></i> Tổng Yêu Cầu</div>
                <div class="text-3xl font-bold text-slate-800" id="metric-total">-</div>
            </div>
            <div class="glass-panel rounded-2xl p-5 shadow-sm">
                <div class="text-slate-500 text-sm font-medium mb-1 flex items-center gap-2"><i class="fa-solid fa-gauge-high text-amber-500"></i> Request / Phút</div>
                <div class="text-3xl font-bold text-slate-800" id="metric-rpm">-</div>
            </div>
            <div class="glass-panel rounded-2xl p-5 shadow-sm">
                <div class="text-slate-500 text-sm font-medium mb-1 flex items-center gap-2"><i class="fa-solid fa-stopwatch text-indigo-500"></i> Độ Trễ Trung Bình</div>
                <div class="text-3xl font-bold text-slate-800" id="metric-latency">-</div>
            </div>
            <div class="glass-panel rounded-2xl p-5 shadow-sm">
                <div class="text-slate-500 text-sm font-medium mb-1 flex items-center gap-2"><i class="fa-solid fa-star text-emerald-500"></i> Mức Độ Hài Lòng</div>
                <div class="text-3xl font-bold text-slate-800" id="metric-satisfaction">-</div>
            </div>
        </div>

        <!-- Drift & Alerts -->
        <div class="glass-panel rounded-2xl p-5 shadow-sm border-l-4 border-l-amber-400">
            <h3 class="text-sm font-bold text-slate-700 mb-3 uppercase tracking-wide"><i class="fa-solid fa-triangle-exclamation text-amber-500 mr-2"></i> Hệ thống Cảnh báo & Drift</h3>
            <div id="alertsContainer" class="space-y-2">
                <div class="text-sm text-slate-500 italic">Đang tải dữ liệu...</div>
            </div>
        </div>

        <!-- Charts Row 1 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Usage Timeline -->
            <div class="glass-panel rounded-2xl p-5 shadow-sm">
                <h3 class="text-sm font-bold text-slate-700 mb-4 uppercase tracking-wide">Lưu Lượng Yêu Cầu</h3>
                <div class="h-64 relative w-full">
                    <canvas id="timelineChart"></canvas>
                </div>
            </div>
            
            <!-- Intent Distribution -->
            <div class="glass-panel rounded-2xl p-5 shadow-sm">
                <h3 class="text-sm font-bold text-slate-700 mb-4 uppercase tracking-wide">Phân Bố Intent</h3>
                <div class="h-64 relative w-full flex justify-center">
                    <canvas id="intentChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Charts Row 2 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Tool Usage -->
            <div class="glass-panel rounded-2xl p-5 shadow-sm">
                <h3 class="text-sm font-bold text-slate-700 mb-4 uppercase tracking-wide">Sử Dụng Tool (Top 5)</h3>
                <div class="h-64 relative w-full flex justify-center">
                    <canvas id="toolChart"></canvas>
                </div>
            </div>
            
            <!-- Active Learning Candidates -->
            <div class="glass-panel rounded-2xl p-5 shadow-sm overflow-hidden flex flex-col h-full">
                <h3 class="text-sm font-bold text-slate-700 mb-4 uppercase tracking-wide">Ứng Cử Viên Active Learning</h3>
                <div class="overflow-y-auto flex-1 max-h-64 pr-2 custom-scrollbar" id="activeLearningList">
                    <div class="text-sm text-slate-500 italic">Đang tải dữ liệu...</div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/telemetry.js"></script>
</body>
</html>
