<script>
        const AUTH_TAB_ANIMATION_MS = 240;

        function setTabState(activeTab) {
            const loginBtn = document.getElementById('tab-btn-login');
            const registerBtn = document.getElementById('tab-btn-register');

            if (activeTab === 'login') {
                loginBtn.classList.add('bg-surface-container-lowest', 'text-primary-container', 'shadow-sm', 'font-bold');
                loginBtn.classList.remove('text-on-surface-variant', 'font-medium');

                registerBtn.classList.remove('bg-surface-container-lowest', 'text-primary-container', 'shadow-sm', 'font-bold');
                registerBtn.classList.add('text-on-surface-variant', 'font-medium');
            } else {
                registerBtn.classList.add('bg-surface-container-lowest', 'text-primary-container', 'shadow-sm', 'font-bold');
                registerBtn.classList.remove('text-on-surface-variant', 'font-medium');

                loginBtn.classList.remove('bg-surface-container-lowest', 'text-primary-container', 'shadow-sm', 'font-bold');
                loginBtn.classList.add('text-on-surface-variant', 'font-medium');
            }
        }

        function switchTab(target) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const formsWrapper = document.getElementById('forms-wrapper');

            const currentTab = loginForm.classList.contains('hidden') ? 'register' : 'login';
            if (target === currentTab) return;

            const showForm = target === 'login' ? loginForm : registerForm;
            const hideForm = target === 'login' ? registerForm : loginForm;

            let startHeight = 0;
            if (formsWrapper) {
                startHeight = formsWrapper.offsetHeight;
                // Lock height BEFORE making changes
                formsWrapper.style.height = `${startHeight}px`;
            }

            // Make hideForm absolute so it doesn't take up document flow space while animating
            hideForm.style.position = 'absolute';
            hideForm.style.top = '0';
            hideForm.style.left = '0';
            hideForm.style.width = '100%';

            // Remove hidden to calculate accurate height for showForm
            showForm.classList.remove('hidden');
            showForm.classList.add('block');

            if (formsWrapper) {
                const nextHeight = showForm.offsetHeight;
                
                // Allow reflow
                void formsWrapper.offsetWidth;

                requestAnimationFrame(() => {
                    formsWrapper.style.height = `${nextHeight}px`;
                });
            }

            setTabState(target);
            
            // Animation logic extracted from animateForms to avoid duplicate display toggles
            hideForm.animate(
                [
                    { opacity: 1, transform: 'translateY(0px)' },
                    { opacity: 0, transform: 'translateY(-8px)' }
                ],
                {
                    duration: AUTH_TAB_ANIMATION_MS,
                    easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
                    fill: 'forwards'
                }
            );

            showForm.animate(
                [
                    { opacity: 0, transform: 'translateY(10px) scale(0.99)' },
                    { opacity: 1, transform: 'translateY(0px) scale(1)' }
                ],
                {
                    duration: AUTH_TAB_ANIMATION_MS,
                    easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
                    fill: 'forwards'
                }
            );

            window.setTimeout(() => {
                hideForm.classList.remove('block');
                hideForm.classList.add('hidden');
                hideForm.style.position = '';
                hideForm.style.top = '';
                hideForm.style.left = '';
                hideForm.style.width = '';
                // Clean up fixed height so it adapts naturally to screen size changes
                formsWrapper.style.height = 'auto';
            }, AUTH_TAB_ANIMATION_MS);
        }

        window.switchTab = switchTab;

        document.addEventListener('DOMContentLoaded', () => {
            const formsWrapper = document.getElementById('forms-wrapper');
            const loginForm = document.getElementById('form-login');

            if (formsWrapper) {
                formsWrapper.style.height = 'auto';
            }

            setTabState('login');
        });
    </script>
