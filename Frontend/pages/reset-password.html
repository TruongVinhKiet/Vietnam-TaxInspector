<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaxInspector - Đặt lại mật khẩu</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="icon" type="image/png" href="../assets/logo.png" />
    <style>
        body { font-family: 'Inter', sans-serif; }
        .reset-bg {
            background:
                radial-gradient(42rem 28rem at 8% -12%, rgba(0, 33, 71, 0.08), transparent 58%),
                radial-gradient(36rem 24rem at 92% 110%, rgba(70, 95, 136, 0.14), transparent 55%),
                linear-gradient(180deg, #f7f9fc 0%, #eef2f8 100%);
        }
        .reset-card {
            animation: resetCardIn 420ms cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes resetCardIn {
            from { opacity: 0; transform: translateY(10px) scale(0.985); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .reset-control {
            transition: border-color 180ms ease, box-shadow 180ms ease, transform 160ms ease;
        }
        .reset-control:focus {
            transform: translateY(-1px);
            box-shadow: 0 0 0 3px rgba(0, 33, 71, 0.15);
        }
        .reset-toast {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translate(-50%, -12px);
            min-width: 280px;
            max-width: 560px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            opacity: 0;
            pointer-events: none;
            transition: opacity 220ms ease, transform 220ms ease;
            box-shadow: 0 12px 30px rgba(2, 16, 43, 0.18);
            z-index: 90;
        }
        .reset-toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }
        .reset-toast-success { background: #0e7a3c; color: #fff; }
        .reset-toast-error { background: #ba1a1a; color: #fff; }
    </style>
</head>
<body class="reset-bg min-h-screen flex items-center justify-center p-6">
    <div id="reset-toast" class="reset-toast" aria-live="polite"></div>

    <main class="w-full max-w-md">
        <div class="reset-card bg-white/95 border border-slate-200/70 rounded-2xl p-8 shadow-[0_20px_45px_rgba(0,33,71,0.1)]">
            <div class="text-center mb-7">
                <img src="../assets/logo.png" alt="TaxInspector" class="w-14 h-14 object-contain mx-auto mb-3" />
                <h1 class="text-2xl font-extrabold tracking-tight text-[#002147]">Đặt lại mật khẩu</h1>
                <p class="text-sm text-slate-500 mt-2">Nhập mật khẩu mới để khôi phục quyền truy cập hệ thống.</p>
            </div>

            <div id="token-warning" class="hidden mb-4 text-xs font-semibold text-red-700 bg-red-50 border border-red-100 rounded-lg px-3 py-2">
                Liên kết không hợp lệ hoặc bị thiếu token. Vui lòng mở lại link trong file outbox.
            </div>

            <form id="reset-form" class="space-y-4">
                <div>
                    <label class="block text-[11px] font-extrabold uppercase tracking-widest text-slate-500 mb-1">Mật khẩu mới</label>
                    <input id="new-password" type="password" placeholder="Tối thiểu 8 ký tự" class="reset-control w-full border border-slate-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#002147]" />
                </div>
                <div>
                    <label class="block text-[11px] font-extrabold uppercase tracking-widest text-slate-500 mb-1">Xác nhận mật khẩu</label>
                    <input id="confirm-password" type="password" placeholder="Nhập lại mật khẩu mới" class="reset-control w-full border border-slate-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#002147]" />
                </div>
                <button id="reset-submit-btn" type="submit" class="w-full bg-[#002147] text-white font-bold rounded-lg py-3.5 hover:bg-[#001832] transition-colors">
                    Cập nhật mật khẩu
                </button>
            </form>

            <a href="login.html" class="mt-4 inline-flex items-center justify-center w-full text-sm font-semibold text-[#002147] hover:underline">
                Quay lại trang đăng nhập
            </a>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/reset-password.js"></script>
</body>
</html>
